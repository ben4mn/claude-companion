<svg viewBox="0 0 36 38" width="68" height="72" fill="none" xmlns="http://www.w3.org/2000/svg">
  <g class="cat-body">
    <!-- Tail -->
    <path class="cat-tail" d="M28 26 Q32 22 31 18"
          stroke="var(--part-body, #e8a44a)" stroke-width="2" stroke-linecap="round" fill="none"/>
    <!-- Body (oval torso) -->
    <ellipse cx="18" cy="24" rx="10" ry="6" fill="var(--part-body, #e8a44a)"/>
    <!-- Belly patch -->
    <ellipse cx="18" cy="25.5" rx="5" ry="3" fill="var(--part-belly, #f4c988)"/>
    <!-- Head -->
    <circle class="cat-head" cx="18" cy="15" r="6.5" fill="var(--part-body, #e8a44a)"/>
    <!-- Ears -->
    <path d="M13 11 L12 6 L16 9 Z" fill="var(--part-body, #e8a44a)"/>
    <path d="M23 11 L24 6 L20 9 Z" fill="var(--part-body, #e8a44a)"/>
    <!-- Inner ears -->
    <path d="M13.5 10 L13 7.5 L15 9 Z" fill="var(--part-belly, #f4c988)"/>
    <path d="M22.5 10 L23 7.5 L21 9 Z" fill="var(--part-belly, #f4c988)"/>
    <!-- Eyes (closed-eye happy line) -->
    <path class="cat-eye-l" d="M14.5 14.5 Q15.5 15.5 16.5 14.5"
          stroke="var(--part-eyes, #2a5028)" stroke-width="0.9" stroke-linecap="round" fill="none"/>
    <path class="cat-eye-r" d="M19.5 14.5 Q20.5 15.5 21.5 14.5"
          stroke="var(--part-eyes, #2a5028)" stroke-width="0.9" stroke-linecap="round" fill="none"/>
    <!-- Nose + mouth -->
    <path d="M18 17 L17 18 M18 17 L19 18" stroke="var(--part-eyes, #2a5028)" stroke-width="0.7" stroke-linecap="round"/>
    <circle cx="18" cy="16.8" r="0.5" fill="var(--part-eyes, #2a5028)"/>
    <!-- Feet -->
    <ellipse class="cat-foot-l" cx="13" cy="30" rx="2" ry="1" fill="var(--part-body, #e8a44a)"/>
    <ellipse class="cat-foot-r" cx="23" cy="30" rx="2" ry="1" fill="var(--part-body, #e8a44a)"/>
  </g>
  <ellipse class="cat-shadow" cx="18" cy="33" rx="10" ry="1.2" fill="rgba(0,0,0,0.12)"/>
</svg>
