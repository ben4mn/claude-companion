<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Companion</title>
    <link rel="stylesheet" href="styles/base.css" />
    <!-- Pack-specific animations.css is injected at runtime by pack_loader.js.
         No static <link> here — switching packs would otherwise stack stale
         animation rules. -->
  </head>
  <body>
    <!--
      The companion root. The body SVG is injected into #footer-mascot by
      pack_loader.js based on the user's active companion. The speech bubble
      stays as a persistent child so in-flight speech survives pack swaps.
    -->
    <div id="robot-overlay">
      <span id="footer-mascot">
        <span id="mascot-speech" class="mascot-speech"></span>
        <!-- Pack body SVG is inserted here at runtime. -->
      </span>
    </div>

    <script type="module" src="engine/behavior.js"></script>
  </body>
</html>
