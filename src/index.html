<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Claude Companion</title>
    <link rel="stylesheet" href="styles/base.css" />
    <!-- Active companion pack is injected at runtime by the loader.
         For v1 we inline the Pane pack's animations directly. -->
    <link rel="stylesheet" href="packs/pane/animations.css" />
  </head>
  <body>
    <!--
      The companion root uses the #robot-overlay / #footer-mascot IDs that the
      PaneStreet animation CSS keys off of. Keeping those IDs lets us reuse the
      full animation library with zero selector rewrites.
    -->
    <div id="robot-overlay">
      <span id="footer-mascot">
        <span id="mascot-speech" class="mascot-speech"></span>
        <!-- Pane's SVG body. The Companion Pack loader will eventually swap
             this HTML from packs/<name>/companion.svg — for v1 it's inlined. -->
        <svg viewBox="0 0 36 38" width="68" height="72" fill="none" xmlns="http://www.w3.org/2000/svg">
          <g class="robot-body">
            <g class="robot-antenna">
              <path d="M18 6.5 Q18 3 17 1.5" stroke="var(--text-secondary)" stroke-width="1.2" stroke-linecap="round" fill="none"/>
              <circle cx="17" cy="1.2" r="1.6" fill="var(--accent)"/>
            </g>
            <g class="robot-head">
              <rect x="6.5" y="5.5" width="23" height="16" rx="8" fill="var(--text-secondary)"/>
              <path d="M14 6.5 Q18 5 22 6.5" stroke="#fff" stroke-width="0.6" opacity="0.3" fill="none" stroke-linecap="round"/>
              <rect x="9.5" y="8.5" width="17" height="11" rx="5" fill="#111"/>
              <ellipse cx="7" cy="13.5" rx="2.2" ry="2.5" fill="var(--text-secondary)"/>
              <ellipse cx="7" cy="13.5" rx="1.2" ry="1.4" fill="var(--text-muted)" opacity="0.4"/>
              <ellipse cx="29" cy="13.5" rx="2.2" ry="2.5" fill="var(--text-secondary)"/>
              <ellipse cx="29" cy="13.5" rx="1.2" ry="1.4" fill="var(--text-muted)" opacity="0.4"/>
              <g class="robot-eyes">
                <circle class="robot-eye-l" cx="14.5" cy="11" r="2" fill="var(--accent)"/>
                <circle class="robot-eye-r" cx="21.5" cy="11" r="2" fill="var(--accent)"/>
              </g>
              <g class="robot-mouth">
                <path class="robot-mouth-smile" d="M15.5 16 Q18 18 20.5 16" stroke="var(--accent)" stroke-width="1" fill="none" stroke-linecap="round"/>
                <path class="robot-mouth-grin"  d="M14 15.5 Q18 20 22 15.5" stroke="var(--accent)" stroke-width="1.1" fill="none" stroke-linecap="round"/>
                <path class="robot-mouth-flat"  d="M16 17 Q18 17 20 17" stroke="var(--accent)" stroke-width="0.9" fill="none" stroke-linecap="round"/>
                <ellipse class="robot-mouth-open" cx="18" cy="17.5" rx="2.4" ry="1.8" fill="none" stroke="var(--accent)" stroke-width="0.9"/>
              </g>
            </g>
            <rect x="12" y="22" width="12" height="7" rx="3" fill="var(--text-secondary)"/>
            <rect x="12.5" y="22.5" width="11" height="3" rx="2" fill="#fff" opacity="0.09"/>
            <rect x="12" y="26" width="12" height="3" rx="1.5" fill="#000" opacity="0.1"/>
            <rect class="robot-arm-l" x="6.5" y="22.5" width="4.5" height="5" rx="2.2" fill="var(--text-secondary)"/>
            <rect class="robot-arm-r" x="25" y="22.5" width="4.5" height="5" rx="2.2" fill="var(--text-secondary)"/>
            <g class="robot-broom-prop">
              <line x1="28" y1="24" x2="34" y2="33" stroke="var(--text-secondary)" stroke-width="1.3" stroke-linecap="round" opacity="0.8"/>
              <path d="M31 33 Q35 31 36.5 34 Q34 36.5 31 35 Z" fill="var(--text-muted)" opacity="0.55"/>
            </g>
            <g class="robot-leg-left">
              <rect x="13.5" y="29" width="3.5" height="3.5" rx="1.2" fill="var(--text-secondary)"/>
              <rect x="12.5" y="32" width="5.5" height="2" rx="1" fill="var(--text-muted)" opacity="0.5"/>
            </g>
            <g class="robot-leg-right">
              <rect x="19" y="29" width="3.5" height="3.5" rx="1.2" fill="var(--text-secondary)"/>
              <rect x="18" y="32" width="5.5" height="2" rx="1" fill="var(--text-muted)" opacity="0.5"/>
            </g>
          </g>
          <ellipse class="robot-shadow" cx="18" cy="35" rx="9" ry="1.3" fill="rgba(0,0,0,0.1)"/>
        </svg>
      </span>
    </div>

    <script type="module" src="engine/behavior.js"></script>
  </body>
</html>
