<svg viewBox="0 0 36 38" width="68" height="72" fill="none" xmlns="http://www.w3.org/2000/svg">
  <g class="ghost-body">
    <!-- Rounded-top body with wavy bottom -->
    <path class="ghost-shape"
          d="M10 18 Q10 8 18 8 Q26 8 26 18 L26 28 Q24 30 22 28 Q20 30 18 28 Q16 30 14 28 Q12 30 10 28 Z"
          fill="var(--part-body, #e8ebf5)"
          opacity="0.95"/>
    <!-- Soft glow outline -->
    <path d="M10 18 Q10 8 18 8 Q26 8 26 18 L26 28 Q24 30 22 28 Q20 30 18 28 Q16 30 14 28 Q12 30 10 28 Z"
          stroke="var(--part-glow, #8c93ad)" stroke-width="0.6" fill="none" opacity="0.45"/>
    <!-- Hollow eyes -->
    <ellipse class="ghost-eye-l" cx="15" cy="16" rx="1.6" ry="2.2" fill="var(--part-eyes, #1a1c2b)"/>
    <ellipse class="ghost-eye-r" cx="21" cy="16" rx="1.6" ry="2.2" fill="var(--part-eyes, #1a1c2b)"/>
    <!-- Small mouth o -->
    <ellipse cx="18" cy="21.5" rx="1.3" ry="1.6" fill="var(--part-eyes, #1a1c2b)" opacity="0.85"/>
  </g>
  <ellipse class="ghost-shadow" cx="18" cy="34" rx="7" ry="0.9" fill="rgba(0,0,0,0.1)"/>
</svg>
