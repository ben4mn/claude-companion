<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161a22"/>
      <stop offset="100%" stop-color="#0d0f14"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#ffffff" fill-opacity="0.06"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Ground line -->
  <line x1="60" y1="490" x2="1140" y2="490" stroke="#ffffff" stroke-opacity="0.12" stroke-dasharray="6 8"/>

  <!-- Title -->
  <text x="60" y="150" fill="#e6e8ef" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="800" font-size="88" letter-spacing="-2">
    Companion
  </text>
  <text x="60" y="210" fill="#a0a6b2" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="400" font-size="32">
    Animated companions for the Claude Desktop app on macOS.
  </text>

  <!-- Tag pills -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="600">
    <g transform="translate(60, 258)">
      <rect width="120" height="36" rx="18" fill="#2a6df0"/>
      <text x="60" y="24" text-anchor="middle" fill="#ffffff">macOS</text>
    </g>
    <g transform="translate(192, 258)">
      <rect width="120" height="36" rx="18" fill="#14181f" stroke="#2a6df0" stroke-width="1.5"/>
      <text x="60" y="24" text-anchor="middle" fill="#e6e8ef">Tauri 2</text>
    </g>
    <g transform="translate(324, 258)">
      <rect width="120" height="36" rx="18" fill="#14181f" stroke="#2a6df0" stroke-width="1.5"/>
      <text x="60" y="24" text-anchor="middle" fill="#e6e8ef">MIT</text>
    </g>
    <g transform="translate(456, 258)">
      <rect width="180" height="36" rx="18" fill="#14181f" stroke="#2a6df0" stroke-width="1.5"/>
      <text x="90" y="24" text-anchor="middle" fill="#e6e8ef">5 packs shipped</text>
    </g>
  </g>

  <!-- URL footer -->
  <text x="60" y="580" fill="#6b7280" font-family="ui-monospace, Menlo, monospace" font-size="22">
    github.com/ben4mn/companion
  </text>

  <!-- Character row: Pane, Blob, Cat, Ghost, Sprite -->
  <!-- Each is the body.svg scaled up. viewBox source is 36x38, rendered at 160x170 (~4.4x). -->

  <!-- Pane (x=220) -->
  <g transform="translate(220, 320) scale(4.4)">
    <path d="M18 6.5 Q18 3 17 1.5" stroke="#b0b0b0" stroke-width="1.2" stroke-linecap="round" fill="none"/>
    <circle cx="17" cy="1.2" r="1.6" fill="#2a6df0"/>
    <rect x="6.5" y="5.5" width="23" height="16" rx="8" fill="#b0b0b0"/>
    <rect x="9.5" y="8.5" width="17" height="11" rx="5" fill="#111"/>
    <circle cx="14.5" cy="11" r="2" fill="#2a6df0"/>
    <circle cx="21.5" cy="11" r="2" fill="#2a6df0"/>
    <path d="M15.5 16 Q18 18 20.5 16" stroke="#2a6df0" stroke-width="1" fill="none" stroke-linecap="round"/>
    <rect x="12" y="22" width="12" height="7" rx="3" fill="#b0b0b0"/>
    <rect x="6.5" y="22.5" width="4.5" height="5" rx="2.2" fill="#b0b0b0"/>
    <rect x="25" y="22.5" width="4.5" height="5" rx="2.2" fill="#b0b0b0"/>
    <rect x="13.5" y="29" width="3.5" height="3.5" rx="1.2" fill="#b0b0b0"/>
    <rect x="19" y="29" width="3.5" height="3.5" rx="1.2" fill="#b0b0b0"/>
    <ellipse cx="18" cy="35" rx="9" ry="1.3" fill="rgba(0,0,0,0.1)"/>
  </g>

  <!-- Blob (x=400) -->
  <g transform="translate(400, 320) scale(4.4)">
    <path d="M18 7 Q26 9 28 18 Q29 27 22 30 Q18 31 14 30 Q7 27 8 18 Q10 9 18 7 Z" fill="#50c8e8"/>
    <path d="M13 12 Q15 10 18 10 Q17 13 14 14 Z" fill="#a4e0ee" opacity="0.7"/>
    <circle cx="15" cy="18" r="1.6" fill="#0a2e3a"/>
    <circle cx="22" cy="18" r="1.6" fill="#0a2e3a"/>
    <path d="M16.5 23 Q18.5 24.5 20.5 23" stroke="#0a2e3a" stroke-width="0.8" fill="none" stroke-linecap="round"/>
    <ellipse cx="18" cy="33" rx="9" ry="1.4" fill="rgba(0,0,0,0.15)"/>
  </g>

  <!-- Cat (x=580) -->
  <g transform="translate(580, 320) scale(4.4)">
    <path d="M28 26 Q32 22 31 18" stroke="#e8a44a" stroke-width="2" fill="none" stroke-linecap="round"/>
    <ellipse cx="18" cy="24" rx="10" ry="6" fill="#e8a44a"/>
    <ellipse cx="18" cy="25.5" rx="5" ry="3" fill="#f4c988"/>
    <circle cx="18" cy="15" r="6.5" fill="#e8a44a"/>
    <path d="M13 11 L12 6 L16 9 Z" fill="#e8a44a"/>
    <path d="M23 11 L24 6 L20 9 Z" fill="#e8a44a"/>
    <path d="M14.5 14.5 Q15.5 15.5 16.5 14.5" stroke="#2a5028" stroke-width="0.9" fill="none" stroke-linecap="round"/>
    <path d="M19.5 14.5 Q20.5 15.5 21.5 14.5" stroke="#2a5028" stroke-width="0.9" fill="none" stroke-linecap="round"/>
    <circle cx="18" cy="16.8" r="0.5" fill="#2a5028"/>
    <ellipse cx="13" cy="30" rx="2" ry="1" fill="#e8a44a"/>
    <ellipse cx="23" cy="30" rx="2" ry="1" fill="#e8a44a"/>
    <ellipse cx="18" cy="33" rx="10" ry="1.2" fill="rgba(0,0,0,0.12)"/>
  </g>

  <!-- Ghost (x=760) -->
  <g transform="translate(760, 320) scale(4.4)">
    <path d="M10 18 Q10 8 18 8 Q26 8 26 18 L26 28 Q24 30 22 28 Q20 30 18 28 Q16 30 14 28 Q12 30 10 28 Z" fill="#e8ebf5" opacity="0.95"/>
    <path d="M10 18 Q10 8 18 8 Q26 8 26 18 L26 28 Q24 30 22 28 Q20 30 18 28 Q16 30 14 28 Q12 30 10 28 Z" stroke="#8c93ad" stroke-width="0.6" fill="none" opacity="0.45"/>
    <ellipse cx="15" cy="16" rx="1.6" ry="2.2" fill="#1a1c2b"/>
    <ellipse cx="21" cy="16" rx="1.6" ry="2.2" fill="#1a1c2b"/>
    <ellipse cx="18" cy="21.5" rx="1.3" ry="1.6" fill="#1a1c2b"/>
    <ellipse cx="18" cy="34" rx="7" ry="0.9" fill="rgba(0,0,0,0.1)"/>
  </g>

  <!-- Sprite (x=940) -->
  <g transform="translate(940, 320) scale(4.4)" shape-rendering="crispEdges">
    <rect x="10" y="9"  width="16" height="2" fill="#2a5c2a"/>
    <rect x="10" y="25" width="16" height="2" fill="#2a5c2a"/>
    <rect x="8"  y="11" width="2"  height="14" fill="#2a5c2a"/>
    <rect x="26" y="11" width="2"  height="14" fill="#2a5c2a"/>
    <rect x="10" y="11" width="16" height="14" fill="#6fd06b"/>
    <rect x="13" y="15" width="3" height="3" fill="#1a1a1a"/>
    <rect x="20" y="15" width="3" height="3" fill="#1a1a1a"/>
    <rect x="15" y="21" width="6" height="2" fill="#2a5c2a"/>
    <rect x="11" y="27" width="4" height="3" fill="#2a5c2a"/>
    <rect x="21" y="27" width="4" height="3" fill="#2a5c2a"/>
    <ellipse cx="18" cy="33" rx="8" ry="1" fill="rgba(0,0,0,0.2)"/>
  </g>

</svg>
